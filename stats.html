<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>대한민국 타자 수비대 — 함께한 기록</title>
<meta name="description" content="전국 아이들과 함께 만든 타자 수비대의 누적 기록이에요." />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#CFEBFF; --butter:#FFF3C9; --cream:#FFFDF5; --berry:#FF8FA8;
  --grape:#9B8CF0; --grape-deep:#7C6BD8; --mint:#6FD3B8; --ink:#5A4A63; --ink-soft:#8C7E95;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px 16px;
  font-family:'Gowun Dodum','Apple SD Gothic Neo',sans-serif; color:var(--ink);
  background:linear-gradient(180deg, #CFEBFF 0%, #DFF2FF 45%, #EAF7E4 100%);
  text-align:center;
}
.wrap{ width:min(760px, 100%); }
h1{ font-family:'Jua'; font-weight:400; font-size:clamp(26px, 5vw, 40px); line-height:1.3; }
h1 .hl{ color:var(--grape-deep); }
.sub{ margin-top:10px; font-size:15px; color:var(--ink-soft); line-height:1.7; }
.hero{ font-size:56px; line-height:1; margin-bottom:8px; }
.stats{
  display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:26px;
}
.stat{
  flex:1; min-width:180px; background:var(--cream); border:3px solid #fff; border-radius:22px;
  padding:22px 16px 18px; box-shadow:0 5px 0 rgba(90,74,99,.10);
}
.stat .ico{ font-size:30px; }
.stat .num{
  font-family:'Jua'; font-weight:400; font-size:clamp(30px, 5vw, 42px);
  color:var(--grape-deep); margin:6px 0 2px; letter-spacing:.01em;
}
.stat .label{ font-size:14px; color:var(--ink-soft); }
.note{ margin-top:20px; font-size:12.5px; color:var(--ink-soft); line-height:1.7; }
.play{
  display:inline-block; margin-top:22px; font-family:'Jua'; font-weight:400; font-size:19px;
  color:#fff; background:var(--berry); border-radius:999px; padding:13px 34px;
  text-decoration:none; box-shadow:0 5px 0 #E9738E;
}
.play:active{ transform:translateY(3px); box-shadow:0 2px 0 #E9738E; }
.err{ margin-top:18px; font-size:13px; color:var(--berry); }
.hidden{ display:none; }
@media (max-width:520px){ .stats{ flex-direction:column; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">🐥⌨️</div>
  <h1>🇰🇷 대한민국 <span class="hl">타자 수비대</span><br>함께한 기록</h1>
  <p class="sub">전국의 어린이 마법사들이 몬스터의 글자를 입력하며<br>학교를 지키고, 타자 실력을 키운 기록이에요.</p>

  <div class="stats">
    <div class="stat"><div class="ico">🏫</div><div class="num" id="n-schools">–</div><div class="label">함께한 학교·학급 코드</div></div>
    <div class="stat"><div class="ico">🧙</div><div class="num" id="n-students">–</div><div class="label">함께한 어린이 마법사</div></div>
    <div class="stat"><div class="ico">🎮</div><div class="num" id="n-plays">–</div><div class="label">누적 플레이 판 수</div></div>
  </div>

  <a class="play" href="./">🪄 나도 한 판 해보기</a>

  <p class="note">
    숫자는 실시간으로 갱신돼요 · 이 페이지에는 개인정보가 전혀 없습니다.<br>
    타자 수비대는 설치 없음 · 광고 없음 · 전 기능 무료인 한글/영어 타자 연습 게임이에요.
  </p>
  <p class="err hidden" id="err"></p>
</div>

<script>
const SUPABASE_URL = "https://dbcydfbduservhiwiwgj.supabase.co";
const SUPABASE_KEY = "sb_publishable_ojqIzp7fD06E50JraS4i-g_uLU8p8pS";

const comma = n => Number(n || 0).toLocaleString("ko-KR");

/* 숫자가 두루룩 올라가는 재미난 연출 */
function countUp(el, target){
  const t = Number(target || 0);
  const dur = 900, t0 = performance.now();
  const tick = now => {
    const p = Math.min(1, (now - t0) / dur);
    el.textContent = comma(Math.round(t * (1 - Math.pow(1 - p, 3))));
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

async function load(){
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_totals`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json" },
      body: "{}"
    });
    if (!res.ok) throw new Error(await res.text());
    const r = (await res.json())[0] || {};
    countUp(document.getElementById("n-schools"),  r.total_schools);
    countUp(document.getElementById("n-students"), r.total_students);
    countUp(document.getElementById("n-plays"),    r.total_plays);
  } catch(e){
    const err = document.getElementById("err");
    err.textContent = "숫자를 불러오지 못했어요. 잠시 후 새로고침해 주세요!";
    err.classList.remove("hidden");
  }
}
load();
setInterval(load, 60000);   // 1분마다 자동 갱신
</script>
</body>
</html>
