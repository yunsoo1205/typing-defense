<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>또박또박 타자 수비대 · 한글 타자 연습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
/* =========================================================
   1. 색상 · 폰트 토큰 (여기 값만 바꿔도 전체 분위기가 바뀝니다)
   ========================================================= */
:root{
  --sky:      #CFEBFF;
  --sky-deep: #A9DAFB;
  --butter:   #FFF3C9;
  --cream:    #FFFDF5;
  --grass:    #B7E4A8;
  --berry:    #FF8FA8;
  --grape:    #9B8CF0;
  --mint:     #6FD3B8;
  --ink:      #5A4A63;
  --ink-soft: #8C7E95;

  --font-display: 'Jua', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  --font-body:    'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif;
  --radius: 22px;
  --shadow: 0 6px 0 rgba(90,74,99,.12), 0 12px 24px rgba(90,74,99,.14);
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:16px;
  font-family:var(--font-body); color:var(--ink);
  background:linear-gradient(180deg, var(--sky) 0%, var(--sky-deep) 55%, #C9EFC0 100%);
  background-attachment:fixed; -webkit-font-smoothing:antialiased;
}

/* =========================================================
   2. 레이아웃 · HUD
   ========================================================= */
#app{
  width:min(960px,100%); background:var(--cream);
  border:4px solid #fff; border-radius:calc(var(--radius) + 8px);
  box-shadow:var(--shadow); overflow:hidden; position:relative;
}
#hud{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:14px 18px; background:var(--butter); border-bottom:4px dashed #fff;
}
.hud-chip{
  display:flex; align-items:center; gap:8px;
  background:#fff; border-radius:999px; padding:8px 16px;
  box-shadow:0 3px 0 rgba(90,74,99,.10);
}
.hud-label{ font-size:13px; color:var(--ink-soft); }
.hud-value{ font-family:var(--font-display); font-size:22px; line-height:1; }
#stage-chip{ background:var(--grape); color:#fff; }
#stage-chip .hud-label{ color:rgba(255,255,255,.85); }
#stage-name{ font-family:var(--font-body); font-size:13px; opacity:.9; }
#name-chip{ background:var(--mint); color:#fff; }
#name-chip .hud-label{ color:rgba(255,255,255,.85); }
#hearts{ margin-left:auto; display:flex; gap:4px; font-size:26px; line-height:1; }
#hearts span{ transition:transform .25s, opacity .25s; }
#hearts span.lost{ opacity:.25; transform:scale(.75) rotate(-14deg); filter:grayscale(1); }

#progress{ height:10px; background:#F0E6C8; }
#progress-fill{
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--berry), var(--grape));
  border-radius:0 999px 999px 0; transition:width .3s ease;
}

/* =========================================================
   3. 게임 화면
   ========================================================= */
#field{
  position:relative; height:430px; overflow:hidden; cursor:text;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,255,255,.7) 0 26px, transparent 27px),
    radial-gradient(circle at 24% 18%, rgba(255,255,255,.7) 0 20px, transparent 21px),
    radial-gradient(circle at 72% 15%, rgba(255,255,255,.55) 0 22px, transparent 23px),
    linear-gradient(180deg, var(--sky) 0%, #E6F6FF 62%, var(--grass) 62%, var(--grass) 100%);
}
#field::after{
  content:""; position:absolute; left:0; right:0; bottom:0; height:38%;
  background:repeating-linear-gradient(90deg, transparent 0 26px, rgba(255,255,255,.18) 26px 30px);
  pointer-events:none;
}
#base{
  position:absolute; left:14px; bottom:24px; z-index:3;
  display:flex; flex-direction:column; align-items:center;
  filter:drop-shadow(0 6px 6px rgba(90,74,99,.18));
}
#cat{ font-size:52px; line-height:1; }
#castle{ font-size:44px; line-height:1; margin-top:-6px; }
#base.hurt{ animation:shake .45s; }
#base.happy #cat{ animation:hop .3s; }
#danger-line{
  position:absolute; top:0; bottom:0; left:96px; width:4px; z-index:2; opacity:.5;
  background:repeating-linear-gradient(180deg, var(--berry) 0 10px, transparent 10px 20px);
}

.monster{
  position:absolute; z-index:2; display:flex; flex-direction:column; align-items:center; gap:2px;
  transform:translateY(-50%); will-change:left;
}
.monster .word{
  font-family:var(--font-display); font-size:26px; padding:6px 14px;
  background:#fff; border:3px solid var(--ink); border-radius:14px; white-space:nowrap;
  box-shadow:0 4px 0 rgba(90,74,99,.18); transition:background .12s, transform .12s;
}
.monster.aimed .word{
  background:var(--butter); border-color:var(--berry);
  transform:translateY(-3px) scale(1.06);
}
.monster .body{
  font-size:40px; line-height:1; animation:bob 1.1s ease-in-out infinite;
  filter:drop-shadow(0 4px 4px rgba(90,74,99,.18));
}
.monster.pop{ animation:pop .35s forwards; pointer-events:none; }

.shot{
  position:absolute; z-index:4; font-size:26px; pointer-events:none;
  transition:left .16s linear, top .16s linear;
}
.popup{
  position:absolute; z-index:5; pointer-events:none; text-align:center;
  font-family:var(--font-display); color:var(--ink);
  text-shadow:0 2px 0 #fff, 0 0 6px #fff;
  animation:float-up .9s ease-out forwards;
}
.popup .gain{ font-size:24px; }
.popup .tag{ display:block; font-size:14px; color:var(--berry); }

/* =========================================================
   4. 입력창
   ========================================================= */
#dock{ padding:16px 18px 20px; background:var(--butter); border-top:4px dashed #fff; }
#input-row{ display:flex; gap:10px; align-items:center; }
#answer{
  flex:1; min-width:0; font-family:var(--font-display); font-size:26px;
  padding:14px 20px; border:4px solid #fff; border-radius:999px;
  background:var(--cream); color:var(--ink); outline:none;
  box-shadow:inset 0 3px 0 rgba(90,74,99,.06);
}
#answer:focus{ border-color:var(--grape); }
#answer.wrong{ animation:shake .4s; border-color:var(--berry); }
#answer::placeholder{ font-family:var(--font-body); font-size:17px; color:#C4B8CB; }
#enter-key{
  font-family:var(--font-display); font-size:18px; padding:14px 22px;
  border:none; border-radius:999px; background:var(--grape); color:#fff;
  box-shadow:0 4px 0 #7C6BD8; cursor:pointer;
}
#enter-key:active{ transform:translateY(3px); box-shadow:0 1px 0 #7C6BD8; }
#hint{ margin-top:10px; font-size:14px; color:var(--ink-soft); text-align:center; }

/* =========================================================
   5. 오버레이
   ========================================================= */
.overlay{
  position:absolute; inset:0; z-index:10; overflow-y:auto;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  text-align:center; padding:22px;
  background:rgba(255,253,245,.95); backdrop-filter:blur(2px);
}
.overlay.hidden{ display:none; }
.overlay h1{ font-family:var(--font-display); font-size:36px; font-weight:400; }
.overlay h2{ font-family:var(--font-display); font-size:28px; font-weight:400; }
.overlay p{ font-size:15px; color:var(--ink-soft); line-height:1.7; }
.big-emoji{ font-size:56px; line-height:1; }

.btn{
  font-family:var(--font-display); font-size:20px; padding:13px 32px;
  border:none; border-radius:999px; background:var(--berry); color:#fff;
  box-shadow:0 5px 0 #E9738E; cursor:pointer;
}
.btn:active{ transform:translateY(4px); box-shadow:0 1px 0 #E9738E; }
.btn.alt{ background:var(--grape); box-shadow:0 5px 0 #7C6BD8; }
.btn.alt:active{ box-shadow:0 1px 0 #7C6BD8; }
.btn.ghost{
  background:#fff; color:var(--ink-soft); box-shadow:0 4px 0 rgba(90,74,99,.12);
  font-size:15px; padding:9px 20px;
}
.btn-row{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.btn:focus-visible, #answer:focus-visible, input:focus-visible{ outline:3px solid var(--grape); outline-offset:3px; }

#nickname{
  font-family:var(--font-display); font-size:22px; text-align:center;
  padding:12px 20px; width:min(280px,80%);
  border:4px solid var(--mint); border-radius:999px;
  background:#fff; color:var(--ink); outline:none;
}

/* 랭킹표 */
.rank-box{
  width:min(420px,100%); background:#fff; border-radius:18px; padding:12px 14px;
  box-shadow:0 4px 0 rgba(90,74,99,.10); text-align:left;
}
.rank-box h3{
  font-family:var(--font-display); font-size:17px; font-weight:400;
  margin-bottom:8px; text-align:center; color:var(--ink-soft);
}
.rank-row{ display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:10px; font-size:15px; }
.rank-row + .rank-row{ margin-top:2px; }
.rank-row.me{ background:var(--butter); }
.rank-row .medal{ width:26px; font-family:var(--font-display); }
.rank-row .who{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rank-row .stage{ font-size:12px; color:var(--ink-soft); }
.rank-row .pts{ font-family:var(--font-display); font-size:17px; }
.rank-empty{ font-size:14px; color:var(--ink-soft); text-align:center; padding:8px; }

#banner{ background:rgba(255,243,201,.95); }
#banner .samples{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
#banner .samples span{
  font-family:var(--font-display); font-size:19px;
  background:#fff; border:3px solid var(--ink); border-radius:12px; padding:4px 12px;
}

/* =========================================================
   6. 애니메이션
   ========================================================= */
@keyframes bob   { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
@keyframes pop   { to { transform:translateY(-50%) scale(1.6); opacity:0; } }
@keyframes hop   { 50%{ transform:translateY(-14px) rotate(-8deg); } }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes float-up { to { transform:translateY(-50px); opacity:0; } }

@media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
@media (max-width:640px){
  #field{ height:360px; }
  .monster .word{ font-size:22px; }
  .monster .body{ font-size:32px; }
  #hearts{ font-size:22px; }
  .overlay h1{ font-size:28px; }
}
</style>
</head>
<body>

<main id="app">
  <header id="hud">
    <div class="hud-chip" id="stage-chip">
      <span class="hud-label">단계</span>
      <span class="hud-value" id="stage-num">1</span>
      <span id="stage-name">모음 자리</span>
    </div>
    <div class="hud-chip" id="name-chip">
      <span class="hud-label">선수</span>
      <span class="hud-value" id="who" style="font-size:17px;">-</span>
    </div>
    <div class="hud-chip">
      <span class="hud-label">점수</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-chip">
      <span class="hud-label">처치</span>
      <span class="hud-value"><span id="kills">0</span>/<span id="goal">10</span></span>
    </div>
    <div id="hearts" aria-label="남은 라이프"></div>
  </header>

  <div id="progress"><div id="progress-fill"></div></div>

  <section id="field">
    <div id="danger-line"></div>
    <div id="base"><div id="cat">🐱</div><div id="castle">🏰</div></div>

    <!-- 시작 화면: 닉네임 + 랭킹 -->
    <div class="overlay" id="start-screen">
      <div class="big-emoji">🐱🛡️</div>
      <h1>또박또박 타자 수비대</h1>
      <p>몬스터 글자를 입력하고 <b>Enter</b>! 빨리 맞힐수록 보너스 점수를 받아요.<br>⌨️ 한/영 키를 눌러 <b>한글 입력</b> 상태로 바꿔 주세요.</p>
      <input id="nickname" maxlength="8" placeholder="닉네임 (최대 8자)" />
      <button class="btn" id="start-btn">시작하기</button>
      <div class="rank-box">
        <h3>🏆 명예의 전당 TOP 10</h3>
        <div id="rank-list-start"></div>
      </div>
      <button class="btn ghost" id="clear-rank-btn">랭킹 지우기</button>
    </div>

    <!-- 단계 시작 안내 -->
    <div class="overlay hidden" id="banner">
      <div class="big-emoji" id="banner-emoji">🐛</div>
      <h2 id="banner-title"></h2>
      <p id="banner-desc"></p>
      <div class="samples" id="banner-samples"></div>
    </div>

    <!-- 단계 완료: 다시 도전 / 다음 단계 -->
    <div class="overlay hidden" id="clear-screen">
      <div class="big-emoji">🎊</div>
      <h2 id="clear-title"></h2>
      <p id="clear-desc"></p>
      <div class="btn-row">
        <button class="btn" id="again-btn">🔁 이 단계 다시 도전</button>
        <button class="btn alt" id="next-btn">▶ 다음 단계로</button>
      </div>
      <p style="font-size:13px;">다시 도전해도 점수는 계속 쌓여요. 하트도 1개 회복!</p>
    </div>

    <!-- 게임 종료 + 랭킹 -->
    <div class="overlay hidden" id="end-screen">
      <div class="big-emoji" id="end-emoji">😿</div>
      <h1 id="end-title">게임 오버</h1>
      <p id="end-desc"></p>
      <div class="rank-box">
        <h3>🏆 명예의 전당 TOP 10</h3>
        <div id="rank-list-end"></div>
      </div>
      <button class="btn" id="retry-btn">처음부터 다시 하기</button>
    </div>
  </section>

  <footer id="dock">
    <div id="input-row">
      <input id="answer" type="text" autocomplete="off" autocapitalize="off"
             spellcheck="false" placeholder="여기에 글자를 입력하고 Enter!" />
      <button id="enter-key">Enter</button>
    </div>
    <p id="hint">틀리게 입력하면 글자가 지워져요. 천천히, 정확하게!</p>
  </footer>
</main>

<script>
/* =========================================================================
   ★ 단계별 단어 데이터 — 이 배열만 고치면 문제 내용이 바뀝니다 ★
   ========================================================================= */
const STAGES = [
  {
    num: 1,
    name: "모음 자리",
    desc: "오른손 자리 연습! 모음 하나씩 또박또박 눌러 보세요.",
    words: ["ㅏ","ㅑ","ㅓ","ㅕ","ㅗ","ㅛ","ㅜ","ㅠ","ㅡ","ㅣ","ㅐ","ㅔ"],
    monsters: ["🐛","🐌","🐞"],
    speed: 58, spawnEvery: 2.4
  },
  {
    num: 2,
    name: "자음 자리",
    desc: "왼손 자리 연습! 자음 하나씩 눌러 보세요.",
    words: ["ㅂ","ㅈ","ㄷ","ㄱ","ㅅ","ㅁ","ㄴ","ㅇ","ㄹ","ㅎ","ㅋ","ㅌ","ㅊ","ㅍ"],
    monsters: ["🐜","🕷️","🦗"],
    speed: 68, spawnEvery: 2.2
  },
  {
    num: 3,
    name: "글자 조합 (받침 없음)",
    desc: "자음 + 모음을 이어서 한 글자를 만들어요.",
    words: ["바","자","거","더","나","미","구","로","가","다","사","마",
            "서","저","비","시","지","누","두","무","노","소","조","코",
            "토","포","하","기","리","니","히","야","여","요","유","츠"],
    monsters: ["👾","🦠","🐙"],
    speed: 78, spawnEvery: 2.1
  },
  {
    num: 4,
    name: "두 글자 단어 (받침 없음)",
    desc: "이제 낱말이에요! 받침 없는 두 글자에 도전.",
    words: ["나비","기차","나무","사자","고기","두부","바다","오리","여우",
            "다리","머리","허리","하마","모자","우유","지도","소파","야구",
            "파도","이모","시소","가수","노래","배추","치마","우비"],
    monsters: ["🦑","🐲","👹"],
    speed: 88, spawnEvery: 2.0
  },
  {
    num: 5,
    name: "받침 단어",
    desc: "마지막 단계! 받침이 하나 붙은 낱말이에요.",
    words: ["나방","가방","수박","구름","바람","공장","사람","하늘","그림",
            "우산","이불","수건","소금","사탕","지붕","자석","마을","저녁",
            "도장","무릎","학교","노을","시장","부엌"],
    monsters: ["👺","🤖","👻"],
    speed: 100, spawnEvery: 1.9
  }
];

/* ------------------------- 게임 규칙 상수 ------------------------- */
const KILLS_PER_STAGE = 10;   // 한 단계에서 잡아야 하는 몬스터 수
const MAX_LIFE        = 3;    // 하트 개수
const BASE_X          = 96;   // 기지 경계선(px) — 여기 닿으면 라이프 감소
const BONUS_WINDOW    = 6;    // 이 시간(초) 안에 잡으면 보너스. 빠를수록 많이!
const HEART_ON_CLEAR  = true; // 단계 완료 시 하트 1개 회복
const RANK_KEY        = "hangul-typing-defense-rank";
const RANK_SIZE       = 10;

/* =========================================================================
   랭킹 저장소
   (Claude 미리보기에서는 window.storage, 다운로드한 파일에서는 localStorage 사용)
   ========================================================================= */
let memoryRanks = [];

const RankStore = {
  async load(){
    if (window.storage){
      try {
        const r = await window.storage.get(RANK_KEY);
        return r ? JSON.parse(r.value) : [];
      } catch(e){ return []; }          // 저장된 기록이 없으면 빈 목록
    }
    try {
      const raw = localStorage.getItem(RANK_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e){ return memoryRanks; }
  },
  async save(list){
    if (window.storage){
      try { await window.storage.set(RANK_KEY, JSON.stringify(list)); return; } catch(e){}
    }
    try { localStorage.setItem(RANK_KEY, JSON.stringify(list)); }
    catch(e){ memoryRanks = list; }
  },
  async add(entry){
    const list = await RankStore.load();
    list.push(entry);
    list.sort((a,b) => b.score - a.score);
    const top = list.slice(0, RANK_SIZE);
    await RankStore.save(top);
    return top;
  },
  async clear(){
    if (window.storage){
      try { await window.storage.delete(RANK_KEY); } catch(e){}
    }
    try { localStorage.removeItem(RANK_KEY); } catch(e){}
    memoryRanks = [];
  }
};

function renderRanks(list, boxId, highlightId){
  const box = document.getElementById(boxId);
  if (!list || list.length === 0){
    box.innerHTML = `<p class="rank-empty">아직 기록이 없어요. 첫 주인공이 되어 보세요!</p>`;
    return;
  }
  const medal = ["🥇","🥈","🥉"];
  box.innerHTML = list.map((r, i) => `
    <div class="rank-row ${r.id === highlightId ? "me" : ""}">
      <span class="medal">${medal[i] || (i+1)}</span>
      <span class="who">${escapeHtml(r.name)}</span>
      <span class="stage">${r.stage}단계</span>
      <span class="pts">${r.score}</span>
    </div>`).join("");
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

/* =========================================================================
   요소 · 상태
   ========================================================================= */
const $ = (id) => document.getElementById(id);
const field = $("field"), input = $("answer"), base = $("base"), cat = $("cat");

let state = null;
let lastTime = 0, rafId = null;

function newGame(nickname){
  return {
    nickname,
    stageIndex: 0,
    score: 0,                                   // 누적 점수 (재도전해도 계속 쌓임)
    life: MAX_LIFE,
    kills: 0,
    stageScore: 0,                              // 이번 도전에서 얻은 점수
    runs: Array(STAGES.length).fill(0),         // 단계별 도전 횟수
    bag: [],                                    // 단어 주머니(섞어서 하나씩 꺼내 씀)
    monsters: [],
    running: false,
    spawnTimer: 0.6
  };
}

/* =========================================================================
   HUD
   ========================================================================= */
function drawHud(){
  const stage = STAGES[state.stageIndex];
  $("stage-num").textContent  = stage.num;
  $("stage-name").textContent = stage.name;
  $("who").textContent        = state.nickname;
  $("score").textContent      = state.score;
  $("kills").textContent      = state.kills;
  $("goal").textContent       = KILLS_PER_STAGE;
  $("progress-fill").style.width = (state.kills / KILLS_PER_STAGE * 100) + "%";

  $("hearts").innerHTML = "";
  for (let i = 0; i < MAX_LIFE; i++){
    const h = document.createElement("span");
    h.textContent = "💖";
    if (i >= state.life) h.classList.add("lost");
    $("hearts").appendChild(h);
  }
}

/* =========================================================================
   단어 뽑기 — 주머니를 섞어 하나씩 꺼내면 같은 단어가 몰리지 않습니다
   ========================================================================= */
function drawWord(){
  if (state.bag.length === 0){
    state.bag = [...STAGES[state.stageIndex].words];
    for (let i = state.bag.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [state.bag[i], state.bag[j]] = [state.bag[j], state.bag[i]];
    }
  }
  return state.bag.pop();
}

/* =========================================================================
   몬스터
   ========================================================================= */
function spawnMonster(){
  const stage = STAGES[state.stageIndex];
  const word = drawWord();
  const face = stage.monsters[Math.floor(Math.random() * stage.monsters.length)];

  const el = document.createElement("div");
  el.className = "monster";
  el.innerHTML = `<div class="word"></div><div class="body">${face}</div>`;
  el.querySelector(".word").textContent = word;

  const lane = Math.floor(Math.random() * 5);
  const top  = field.clientHeight * (0.28 + lane * 0.13);
  const x    = field.clientWidth + 20;
  el.style.left = x + "px";
  el.style.top  = top + "px";
  field.appendChild(el);

  state.monsters.push({ el, word, x, top, bornAt: performance.now() });
}

function moveMonsters(dt){
  const stage = STAGES[state.stageIndex];
  const speed = stage.speed * (field.clientWidth / 900);   // 화면 폭에 맞춰 보정

  for (let i = state.monsters.length - 1; i >= 0; i--){
    const m = state.monsters[i];
    m.x -= speed * dt;
    m.el.style.left = m.x + "px";
    if (m.x <= BASE_X){
      m.el.remove();
      state.monsters.splice(i, 1);
      loseLife();
    }
  }
}

/* =========================================================================
   입력 · 처치 · 속도 보너스
   ========================================================================= */
function submitAnswer(){
  const typed = input.value.trim();
  input.value = "";
  highlightAimed();
  if (!typed || !state || !state.running) return;

  let target = null;                       // 같은 글자가 여럿이면 기지에 가까운 것부터
  for (const m of state.monsters){
    if (m.word === typed && (!target || m.x < target.x)) target = m;
  }
  if (target) killMonster(target);
  else {
    input.classList.remove("wrong");
    void input.offsetWidth;
    input.classList.add("wrong");
  }
}

function killMonster(m){
  const stage = STAGES[state.stageIndex];

  /* --- 점수 = 기본 점수 + 속도 보너스 (등장 후 빨리 잡을수록 큼) --- */
  const seconds = (performance.now() - m.bornAt) / 1000;
  const basePts = 10 * stage.num;
  const ratio   = Math.max(0, 1 - seconds / BONUS_WINDOW);
  const bonus   = Math.round(basePts * ratio);
  const gained  = basePts + bonus;

  let tag = "";
  if (seconds < 1.5)    tag = `⚡ 번개같이! +${bonus}`;
  else if (seconds < 3) tag = `✨ 빠르다! +${bonus}`;
  else if (bonus > 0)   tag = `+${bonus} 보너스`;

  state.score      += gained;
  state.stageScore += gained;
  state.kills      += 1;

  showPopup(m, gained, tag);
  shootStar(m);

  m.el.classList.add("pop");
  m.el.querySelector(".word").textContent = "💥";
  setTimeout(() => m.el.remove(), 350);
  state.monsters = state.monsters.filter(x => x !== m);

  cat.textContent = "😻";
  base.classList.add("happy");
  setTimeout(() => { cat.textContent = "🐱"; base.classList.remove("happy"); }, 320);

  drawHud();
  if (state.kills >= KILLS_PER_STAGE) stageCleared();
}

function showPopup(m, gained, tag){
  const p = document.createElement("div");
  p.className = "popup";
  p.innerHTML = `<span class="gain">+${gained}</span>${tag ? `<span class="tag">${tag}</span>` : ""}`;
  p.style.left = (m.x - 20) + "px";
  p.style.top  = (m.top - 40) + "px";
  field.appendChild(p);
  setTimeout(() => p.remove(), 900);
}

function shootStar(m){
  const star = document.createElement("div");
  star.className = "shot";
  star.textContent = "⭐";
  star.style.left = "70px";
  star.style.top  = (field.clientHeight - 70) + "px";
  field.appendChild(star);
  requestAnimationFrame(() => { star.style.left = m.x + "px"; star.style.top = m.top + "px"; });
  setTimeout(() => star.remove(), 260);
}

function highlightAimed(){
  if (!state) return;
  const typed = input.value.trim();
  for (const m of state.monsters){
    m.el.classList.toggle("aimed", typed.length > 0 && m.word.startsWith(typed));
  }
}

/* =========================================================================
   라이프 · 단계 완료 · 종료
   ========================================================================= */
function loseLife(){
  state.life -= 1;
  cat.textContent = "🙀";
  base.classList.add("hurt");
  setTimeout(() => { cat.textContent = "🐱"; base.classList.remove("hurt"); }, 450);
  drawHud();
  if (state.life <= 0) endGame(false);
}

function clearMonsters(){
  state.monsters.forEach(m => m.el.remove());
  state.monsters = [];
}

/* 단계 완료 → 다시 도전 / 다음 단계 선택 */
function stageCleared(){
  const stage = STAGES[state.stageIndex];
  state.running = false;
  clearMonsters();

  if (HEART_ON_CLEAR && state.life < MAX_LIFE){ state.life += 1; }
  drawHud();

  const isLast = state.stageIndex >= STAGES.length - 1;
  const runs   = state.runs[state.stageIndex];

  $("clear-title").textContent = `${stage.num}단계 클리어!`;
  $("clear-desc").innerHTML =
    `이번 도전 <b>${state.stageScore}점</b> 획득 · 누적 <b>${state.score}점</b>` +
    (runs > 1 ? `<br>이 단계 ${runs}번째 도전이에요 👏` : "");
  $("next-btn").textContent = isLast ? "🏆 기록 등록하고 끝내기" : "▶ 다음 단계로";

  $("clear-screen").classList.remove("hidden");
}

/* 단계 시작 */
function startStage(index){
  state.stageIndex = index;
  state.kills = 0;
  state.stageScore = 0;
  state.bag = [];
  state.spawnTimer = 0.4;
  state.runs[index] += 1;
  drawHud();

  const stage = STAGES[index];
  $("banner-emoji").textContent = stage.monsters[0];
  $("banner-title").textContent = `${stage.num}단계 · ${stage.name}`;
  $("banner-desc").textContent  = stage.desc +
    (state.runs[index] > 1 ? `  (${state.runs[index]}번째 도전)` : "");
  $("banner-samples").innerHTML = stage.words.slice(0, 6).map(w => `<span>${w}</span>`).join("");
  $("banner").classList.remove("hidden");

  setTimeout(() => {
    $("banner").classList.add("hidden");
    state.running = true;
    input.focus();
  }, 2000);
}

/* 게임 종료 → 랭킹 등록 */
async function endGame(cleared){
  state.running = false;
  clearMonsters();

  const entry = {
    id: Date.now(),
    name: state.nickname,
    score: state.score,
    stage: STAGES[state.stageIndex].num
  };
  const top = await RankStore.add(entry);
  const rank = top.findIndex(r => r.id === entry.id);

  $("end-emoji").textContent = cleared ? "🎉" : "😿";
  $("end-title").textContent = cleared ? "전부 지켜냈어요!" : "게임 오버";
  $("end-desc").innerHTML =
    `${escapeHtml(state.nickname)} 선수 최종 <b>${state.score}점</b>` +
    (rank >= 0 ? ` · 명예의 전당 <b>${rank + 1}위</b>! 🎖️` : ` · 아쉽게 TOP ${RANK_SIZE} 밖이에요.`);

  renderRanks(top, "rank-list-end", entry.id);
  renderRanks(top, "rank-list-start", entry.id);
  $("end-screen").classList.remove("hidden");
}

/* =========================================================================
   루프
   ========================================================================= */
function loop(now){
  rafId = requestAnimationFrame(loop);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  if (!state || !state.running) return;

  const stage = STAGES[state.stageIndex];
  state.spawnTimer -= dt;
  if (state.spawnTimer <= 0){
    spawnMonster();
    state.spawnTimer = stage.spawnEvery;
  }
  moveMonsters(dt);
}

/* =========================================================================
   시작 / 재시작 / 버튼
   ========================================================================= */
function startGame(){
  const nickname = ($("nickname").value.trim() || "이름없는용사").slice(0, 8);
  cancelAnimationFrame(rafId);
  if (state) clearMonsters();

  state = newGame(nickname);
  drawHud();
  $("start-screen").classList.add("hidden");
  $("end-screen").classList.add("hidden");
  $("clear-screen").classList.add("hidden");
  input.value = "";
  input.focus();

  startStage(0);
  lastTime = performance.now();
  rafId = requestAnimationFrame(loop);
}

$("start-btn").addEventListener("click", startGame);

$("again-btn").addEventListener("click", () => {     // 같은 단계 반복 — 점수 누적
  $("clear-screen").classList.add("hidden");
  startStage(state.stageIndex);
});
$("next-btn").addEventListener("click", () => {
  $("clear-screen").classList.add("hidden");
  if (state.stageIndex >= STAGES.length - 1) endGame(true);
  else startStage(state.stageIndex + 1);
});
$("retry-btn").addEventListener("click", () => {
  $("end-screen").classList.add("hidden");
  $("start-screen").classList.remove("hidden");
  $("nickname").focus();
});
$("clear-rank-btn").addEventListener("click", async () => {
  await RankStore.clear();
  renderRanks([], "rank-list-start");
});
$("enter-key").addEventListener("click", () => { submitAnswer(); input.focus(); });
field.addEventListener("click", (e) => { if (!e.target.closest(".overlay")) input.focus(); });
input.addEventListener("input", highlightAimed);
$("nickname").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.isComposing) startGame();
});

/* ---- 한글 IME 처리: 조합 중 Enter는 조합 확정에 먼저 쓰이므로 예약했다가 발사 ---- */
let pendingEnter = false;
input.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  if (e.isComposing || e.keyCode === 229){ pendingEnter = true; return; }
  e.preventDefault();
  pendingEnter = false;
  submitAnswer();
});
input.addEventListener("compositionend", () => {
  if (!pendingEnter) return;
  pendingEnter = false;
  setTimeout(submitAnswer, 0);
});
input.addEventListener("keyup", (e) => {
  if (e.key === "Enter" && pendingEnter){ pendingEnter = false; submitAnswer(); }
});

/* 첫 화면에 랭킹 표시 */
(async () => { renderRanks(await RankStore.load(), "rank-list-start"); })();
</script>
</body>
