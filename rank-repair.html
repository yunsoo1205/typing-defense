<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>타자 수비대 - 랭킹 복구 도구 (관리자용)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#CFEBFF; --butter:#FFF3C9; --cream:#FFFDF5; --berry:#FF8FA8;
  --grape:#9B8CF0; --mint:#6FD3B8; --ink:#5A4A63; --ink-soft:#8C7E95;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  font-family:'Gowun Dodum', 'Malgun Gothic', sans-serif; color:var(--ink);
  background:linear-gradient(180deg, var(--sky), #C9EFC0); min-height:100vh;
  display:flex; justify-content:center; padding:24px 12px;
}
#wrap{ width:min(900px,100%); background:var(--cream); border:4px solid #fff; border-radius:24px;
  box-shadow:0 6px 0 rgba(90,74,99,.12), 0 12px 28px rgba(90,74,99,.16); padding:26px 28px; }
h1{ font-family:'Jua'; font-weight:400; font-size:26px; margin-bottom:4px; }
.sub{ font-size:13.5px; color:var(--ink-soft); line-height:1.7; margin-bottom:16px; }
.box{ background:#fff; border-radius:16px; padding:14px 16px; margin-bottom:14px; box-shadow:0 3px 0 rgba(90,74,99,.08);
  display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
label{ font-family:'Jua'; font-size:15px; color:var(--grape); }
input{
  font-family:'Jua'; font-size:17px; padding:9px 14px; width:150px; text-align:center;
  border:3px solid var(--mint); border-radius:999px; outline:none; text-transform:uppercase; letter-spacing:.06em;
}
button{
  font-family:'Jua'; font-size:15px; font-weight:400; padding:10px 20px; border:none; border-radius:999px;
  background:var(--berry); color:#fff; box-shadow:0 4px 0 #E9738E; cursor:pointer;
}
button:active{ transform:translateY(3px); box-shadow:0 1px 0 #E9738E; }
button.all{ background:var(--mint); box-shadow:0 4px 0 #56BFA3; }
button.all:active{ box-shadow:0 1px 0 #56BFA3; }
button.fix{ background:var(--grape); box-shadow:0 4px 0 #7C6BD8; }
button.fix:active{ box-shadow:0 1px 0 #7C6BD8; }
button:disabled{ opacity:.45; cursor:not-allowed; }
h2{ font-family:'Jua'; font-weight:400; font-size:18px; margin:14px 0 8px; }
table{ width:100%; border-collapse:collapse; font-size:14px; background:#fff; border-radius:12px; overflow:hidden; margin-bottom:6px; }
th,td{ padding:7px 10px; text-align:center; border-bottom:1px solid #F0EAF4; }
th{ background:var(--butter); font-family:'Jua'; font-weight:400; font-size:13.5px; }
td.name{ text-align:left; }
tr.bad td{ background:#FFF0F3; }
tr.miss td{ background:#FFF8E8; }
.tag{ font-size:12px; border-radius:999px; padding:2px 10px; font-family:'Jua'; }
.tag.ok{ background:#E7F7EA; color:#2E8B57; }
.tag.bad{ background:#FFDCE4; color:#D14A6A; }
.tag.miss{ background:#FFEFC2; color:#B8860B; }
#status{ font-family:'Jua'; font-size:14px; color:var(--grape); margin:6px 0; min-height:20px; }
#log{ font-size:13px; line-height:1.8; color:var(--ink-soft); margin-top:10px; white-space:pre-wrap;
  max-height:300px; overflow-y:auto; }
.note{ font-size:12.5px; color:var(--ink-soft); line-height:1.7; margin-top:14px; background:var(--butter); border-radius:12px; padding:10px 14px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>🛠️ 타자 수비대 랭킹 복구 도구</h1>
  <p class="sub">
    전체 랭킹이 나중에 한 낮은 점수로 덮어써져 깎이던 버그를 복구하는 <b>관리자용</b> 도구예요.<br>
    <b>🌍 전체 학교 한번에 검사</b>를 누르면 모든 학급 코드를 자동으로 찾아 검사하고,
    <b>✨ 복구하기</b> 한 번이면 전부 원래 최고점으로 되돌립니다. 기록을 지우는 일은 전혀 없어요.
  </p>

  <div class="box">
    <button id="scan-all-btn" class="all">🌍 전체 학교 한번에 검사</button>
    <span style="color:var(--ink-soft); font-size:13px;">또는</span>
    <label for="code">한 학급만:</label>
    <input id="code" maxlength="8" placeholder="예: WHKS" />
    <button id="scan-btn">🔍 검사</button>
    <button id="fix-btn" class="fix" disabled>✨ 복구하기 (<span id="fix-count">0</span>건)</button>
  </div>

  <p id="status"></p>
  <div id="result"></div>
  <div id="log"></div>

  <p class="note">
    💡 이 파일은 관리자(윤수님)만 가지고 계시면 돼요 — GitHub에 올리거나 선생님들께 나눠줄 필요 없어요.
    복구가 끝나면 게임의 전체 랭킹에 바로 반영됩니다. (주간 랭킹은 원래 정상이라 건드리지 않아요)
  </p>
</div>

<script>
const SUPABASE_URL = "https://dbcydfbduservhiwiwgj.supabase.co";
const SUPABASE_KEY = "sb_publishable_ojqIzp7fD06E50JraS4i-g_uLU8p8pS";
const HEADERS = { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY };
const NAMELESS = "이름없는마법사";
const MODE_LABEL = { "-E":"🐣 초급", "-H":"🔥 고급", "-I":"♾️ 무한" };

const $ = id => document.getElementById(id);
let plan = [];   // 복구할 목록

function log(msg){ $("log").textContent += msg + "\n"; }
function setStatus(msg){ $("status").textContent = msg; }

/* 게임(index.html)과 완전히 같은 방식의 학습자 ID 계산 */
async function sha256Hex(str){
  try {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  } catch(e){
    let h = 0;
    for (let i = 0; i < str.length; i++){ h = (h * 31 + str.charCodeAt(i)) >>> 0; }
    return "fb" + h.toString(16);
  }
}
async function computeLearnerId(name, classCode){
  const hash = await sha256Hex(`${classCode}::${name}`);
  return `${classCode}_${hash.slice(0,16)}`;
}
/* "WHKS-E" → "WHKS" (learner_id 계산에는 접미사 없는 원본 코드를 씁니다) */
function rawCodeOf(key){
  return /-[EHI]$/.test(key) ? key.slice(0, -2) : key;
}
function labelOf(key){
  const m = key.match(/-[EHI]$/);
  return m ? MODE_LABEL[m[0]] : "🎖️ (옛 방식)";
}

async function getJSON(path){
  const r = await fetch(SUPABASE_URL + path, { headers: HEADERS });
  if (!r.ok) throw new Error(r.status + " " + path);
  return r.json();
}

/* 테이블을 1000줄씩 나눠서 전부 가져옵니다 */
async function fetchPaged(makePath, maxPages){
  const all = [];
  for (let page = 0; page < (maxPages || 30); page++){
    const rows = await getJSON(makePath(page));
    all.push(...rows);
    if (rows.length < 1000) break;
  }
  return all;
}
const fetchAllHistory = (codeKey) => fetchPaged(p =>
  `/rest/v1/scores?select=name,score,stage,created_at&code=eq.${encodeURIComponent(codeKey)}`
  + `&order=created_at.asc&limit=1000&offset=${p*1000}`);

async function fetchHigh(codeKey){
  try {
    return await getJSON(`/rest/v1/user_high_scores?select=id,learner_id,name,score,stage&code=eq.${encodeURIComponent(codeKey)}&order=score.desc&limit=500`);
  } catch(e){
    return await getJSON(`/rest/v1/user_high_scores?select=id,name,score,stage&code=eq.${encodeURIComponent(codeKey)}&order=score.desc&limit=500`);
  }
}

/* 모든 학급 코드를 자동으로 찾습니다 (scores 이력 + 현재 랭킹표에서) */
async function discoverAllKeys(){
  setStatus("학급 코드를 찾는 중…");
  const keys = new Set();
  const hist = await fetchPaged(p => `/rest/v1/scores?select=code&order=id.asc&limit=1000&offset=${p*1000}`, 100);
  for (const r of hist) if (r.code) keys.add(r.code);
  const high = await fetchPaged(p => `/rest/v1/user_high_scores?select=code&order=id.asc&limit=1000&offset=${p*1000}`, 30);
  for (const r of high) if (r.code) keys.add(r.code);
  return Array.from(keys).sort();
}

/* 한 코드키(예: WHKS-E)를 검사해서 {rows, fixes}를 돌려줍니다 */
async function scanKey(key){
  const [high, hist] = await Promise.all([fetchHigh(key), fetchAllHistory(key)]);
  const best = new Map();
  for (const r of hist){
    if (!r.name || r.name === NAMELESS) continue;
    const cur = best.get(r.name);
    if (!cur || r.score > cur.score) best.set(r.name, r);
  }
  const highByName = new Map();
  for (const h of high){
    const cur = highByName.get(h.name);
    if (!cur || h.score > cur.score) highByName.set(h.name, h);
  }
  const names = new Set([...best.keys(), ...highByName.keys()]);
  const rows = [], fixes = [];
  for (const name of names){
    if (name === NAMELESS) continue;
    const b = best.get(name);
    const h = highByName.get(name);
    const trueBest = Math.max(b ? b.score : 0, h ? h.score : 0);
    let status = "ok";
    if (h && b && b.score > h.score) status = "bad";
    else if (!h && b) status = "miss";
    rows.push({ name, cur: h ? h.score : null, best: trueBest, status });
    if (status !== "ok"){
      fixes.push({ codeKey: key, name, score: b.score, stage: Math.min(b.stage || 1, 10),
                   learnerId: (h && h.learner_id) ? h.learner_id : null, rawCode: rawCodeOf(key) });
    }
  }
  rows.sort((a,b) => b.best - a.best);
  return { rows, fixes };
}

const tagOf = s => s === "ok" ? '<span class="tag ok">정상</span>'
               : s === "bad" ? '<span class="tag bad">깎여 있음</span>'
               : '<span class="tag miss">랭킹에 없음</span>';

function renderDetailTable(key, rows, onlyProblems){
  const show = onlyProblems ? rows.filter(r => r.status !== "ok") : rows;
  if (!show.length) return "";
  return `<h2>${labelOf(key)} (${key})</h2>
    <table><tr><th>이름</th><th>현재 전체 랭킹</th><th>진짜 최고점</th><th>상태</th></tr>
    ${show.map(r => `<tr class="${r.status}"><td class="name">${r.name}</td>
      <td>${r.cur === null ? "-" : r.cur.toLocaleString()}</td>
      <td><b>${r.best.toLocaleString()}</b></td><td>${tagOf(r.status)}</td></tr>`).join("")}
    </table>`;
}

function afterScan(){
  $("fix-count").textContent = plan.length;
  if (plan.length === 0){
    setStatus("✅ 모든 기록이 정상이에요! 복구할 것이 없습니다.");
    $("fix-btn").disabled = true;
  } else {
    setStatus(`🔧 복구가 필요한 기록: ${plan.length}건 — [✨ 복구하기]를 눌러 주세요.`);
    $("fix-btn").disabled = false;
  }
}

/* --- 한 학급만 검사 --- */
async function scanOne(){
  const code = $("code").value.trim().toUpperCase();
  if (!code){ alert("학급 코드를 입력해 주세요!"); return; }
  $("result").innerHTML = ""; $("log").textContent = ""; plan = [];
  $("scan-btn").disabled = $("scan-all-btn").disabled = $("fix-btn").disabled = true;
  try {
    for (const suffix of ["-E","-H","-I"]){
      const key = code + suffix;
      setStatus(`${key} 검사 중…`);
      const { rows, fixes } = await scanKey(key);
      plan.push(...fixes);
      if (rows.length) $("result").innerHTML += renderDetailTable(key, rows, false);
    }
    if (!$("result").innerHTML){
      setStatus("이 코드로 저장된 기록을 찾지 못했어요. 코드를 다시 확인해 주세요.");
    } else afterScan();
  } catch(e){
    setStatus("😢 불러오기에 실패했어요."); log("오류: " + e.message);
  }
  $("scan-btn").disabled = $("scan-all-btn").disabled = false;
}

/* --- 전체 학교 한번에 검사 --- */
async function scanAll(){
  $("result").innerHTML = ""; $("log").textContent = ""; plan = [];
  $("scan-btn").disabled = $("scan-all-btn").disabled = $("fix-btn").disabled = true;
  try {
    const keys = await discoverAllKeys();
    log(`발견한 학급 코드(난이도 포함): ${keys.length}개`);
    const summary = [];
    let done = 0, detailHtml = "";
    for (const key of keys){
      setStatus(`검사 중… (${++done}/${keys.length}) ${key}`);
      try {
        const { rows, fixes } = await scanKey(key);
        plan.push(...fixes);
        summary.push({ key, students: rows.length, broken: fixes.length });
        if (fixes.length) detailHtml += renderDetailTable(key, rows, true);   // 문제 있는 학생만 표시
      } catch(e){ log(`⚠️ ${key} 검사 실패: ${e.message}`); }
    }
    const withIssue = summary.filter(s => s.broken > 0);
    $("result").innerHTML = `<h2>📋 학교(코드)별 요약</h2>
      <table><tr><th>코드</th><th>학생 수</th><th>복구 필요</th></tr>
      ${summary.map(s => `<tr class="${s.broken ? "bad" : ""}"><td>${s.key}</td>
        <td>${s.students}</td><td>${s.broken ? "🔧 " + s.broken + "건" : "✅ 없음"}</td></tr>`).join("")}
      </table>
      ${withIssue.length ? "<h2>🔧 복구 대상 상세 (문제 있는 학생만)</h2>" + detailHtml : ""}`;
    afterScan();
  } catch(e){
    setStatus("😢 불러오기에 실패했어요."); log("오류: " + e.message);
  }
  $("scan-btn").disabled = $("scan-all-btn").disabled = false;
}

/* --- 복구 --- */
async function fix(){
  $("fix-btn").disabled = true;
  let ok = 0, fail = 0, done = 0;
  for (const p of plan){
    setStatus(`복구 중… (${++done}/${plan.length})`);
    try {
      const learnerId = p.learnerId || await computeLearnerId(p.name, p.rawCode);
      const send = (stage) => fetch(
        `${SUPABASE_URL}/rest/v1/user_high_scores?on_conflict=learner_id,code`,
        { method:"POST",
          headers: { ...HEADERS, "Content-Type":"application/json", "Prefer":"resolution=merge-duplicates,return=minimal" },
          body: JSON.stringify({ learner_id: learnerId, code: p.codeKey, name: p.name, score: p.score, stage: p.stage }) });
      let res = await send(p.stage);
      if (!res.ok) res = await send(10);
      if (res.ok){ ok++; log(`✅ [${p.codeKey}] ${p.name} → ${p.score.toLocaleString()}점 복구`); }
      else { fail++; log(`❌ [${p.codeKey}] ${p.name} 복구 실패 (${res.status})`); }
    } catch(e){ fail++; log(`❌ [${p.codeKey}] ${p.name} 복구 실패: ${e.message}`); }
  }
  setStatus(`🎉 완료! 성공 ${ok}건${fail ? ` · 실패 ${fail}건` : ""}. 검사를 다시 눌러 확인해 보세요.`);
  plan = []; $("fix-count").textContent = 0;
}

$("scan-btn").addEventListener("click", scanOne);
$("scan-all-btn").addEventListener("click", scanAll);
$("fix-btn").addEventListener("click", fix);
$("code").addEventListener("keydown", e => { if (e.key === "Enter") scanOne(); });
</script>
</body>
</html>
